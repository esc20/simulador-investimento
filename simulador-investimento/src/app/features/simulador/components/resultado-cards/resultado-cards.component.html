<div class="cards-grid" *ngIf="dadosFinais() as dados">
  <div class="card principal">
    <span>Total Acumulado</span>
    <h2>{{ dados.valorTotal | currency:'BRL' }}</h2>
  </div>

  <div class="secundarios">
    <div class="card">
      <span>Total Investido</span>
      <p>{{ dados.totalInvestido | currency:'BRL' }}</p>
    </div>

    <div class="card">
      <span>Total em Juros</span>
      <p class="juros">{{ dados.totalJuros | currency:'BRL' }}</p>
    </div>
  </div>
</div>
