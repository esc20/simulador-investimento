<main class="container">
  <header>
    <h1>Apex Invest</h1>
    <p>Simulador de Patrimônio</p>
  </header>

  <div class="dashboard-grid">
    <section class="configuracao">
      <app-formulario (aoSimular)="atualizarResultados($event)"></app-formulario>
    </section>

    <section class="visualizacao">
      <app-resultado-cards [resultados]="resultadosSimulacao()"></app-resultado-cards>

      <app-insights [resultados]="resultadosSimulacao()"></app-insights>

    
      @defer (on viewport) {
        <app-grafico-evolucao [resultados]="resultadosSimulacao()"></app-grafico-evolucao>
      } @placeholder {
        <div class="carregando-grafico" style="padding: 20px; text-align: center; color: #797670; font-family: 'Inter', sans-serif; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">
          Carregando painel analítico...
        </div>
      }

      <app-tabela-evolucao [resultados]="resultadosSimulacao()"></app-tabela-evolucao>
    </section>
  </div>
</main>
